  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .animate-slideIn { animation: slideIn 0.3s ease-out forwards; }
    .message-bubble-sent {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border-radius: 20px 20px 5px 20px;
      max-width: 80%;
      margin-left: auto;
    }
    .message-bubble-received {
      background: #f3f4f6;
      border-radius: 20px 20px 20px 5px;
      max-width: 80%;
    }
    .chat-image {
      max-width: 200px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .chat-image:hover {
      transform: scale(1.05);
    }
    .support-badge {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      transition: all 0.3s ease;
    }
    .support-badge.hidden {
      display: none;
    }
    .back-support-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      animation: slideIn 0.3s ease-out forwards;
    }
    .status-badge {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border-radius: 9999px;
      font-weight: bold;
      font-size: 1rem;
    }
  </style>

<body class="bg-gradient-to-br from-blue-50 to-gray-100 min-h-screen p-4 text-right font-sans">

  <div class="support-badge" id="supportButton">

  </div>

  <!-- زر العودة للصفحة الرئيسية (يظهر عند فتح الدعم) -->
  
  </div>

    <div class="text-center mb-8 mt-12">

        <h1 class="text-4xl font-bold text-blue-800 mb-2">ورشة+</h1>

          <input type="password" id="searchCarPassword"

        <button onclick="searchCar()"

      <div class="bg-gradient-to-r from-blue-600 to-blue-700 p-4 text-white">

      <div class="p-6 space-y-5">

              <img id="maintenanceImage" src="" class="w-full h-32 object-cover rounded-lg cursor-pointer" onclick="openFullImage(this.src)">
            </div>

      <div id="chatMessages" class="h-96 overflow-y-auto p-4 space-y-3 bg-gray-50">

  <!-- مودال عرض الصورة الكاملة -->

      <button onclick="closeFullImage()" class="absolute -top-10 right-0 text-white text-2xl hover:text-gray-300">✕</button>

  <!-- مودال مركز الدعم -->
  <div id="supportModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto animate-slideIn">
      <div class="p-6">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-bold text-red-600 flex items-center gap-2">
            <i class="ph ph-headset"></i>
            مركز الدعم الفني

          <button onclick="closeSupportModalAndShowButton()" class="text-gray-500 hover:text-gray-700 text-2xl">✕</button>
        </div>

        <div class="bg-red-50 p-4 rounded-xl mb-6">
          <p class="text-sm text-gray-600">للتواصل السريع: الدعم متاح على مدار الساعة</p>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">رقم الهاتف (ليبي)</label>

            <p class="text-xs text-gray-500 mt-1">مثال: 0912345678</p>
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">نوع المشكلة</label>
            <select id="supportType" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
              <option value="فنية">مشكلة فنية في النظام</option>
              <option value="استفسار">استفسار عن ورشة</option>
              <option value="شكوى">شكوى على ورشة</option>
              <option value="اقتراح">اقتراح</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">تفاصيل الشكوى</label>
            <textarea id="supportMessage" rows="5" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none" placeholder="اكتب مشكلتك بالتفصيل..."></textarea>
          </div>
          <button onclick="sendUserSupportTicket()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-bold text-lg transition transform hover:scale-105">
            إرسال الشكوى إلى الدعم الفني

  <script>
    let currentWorkshopId = null;
    let currentCarKey = null;
    let currentCarData = null;
    let chatListener = null;

    // دالة لعرض التنبيهات
    function showAlert(message, type = 'success') {
      const alertDiv = document.createElement('div');
      alertDiv.className = `fixed top-20 right-4 p-4 rounded-xl shadow-2xl z-[100] animate-slideIn flex items-center gap-3 ${
        type === 'success' ? 'bg-green-500' : 
        type === 'error' ? 'bg-red-500' : 
        'bg-yellow-500'
      } text-white`;
      
      const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️';
      alertDiv.innerHTML = `${icon} ${message}`;
      
      document.body.appendChild(alertDiv);
      
      setTimeout(() => {
        alertDiv.style.opacity = '0';
        alertDiv.style.transition = 'opacity 0.5s';
        setTimeout(() => alertDiv.remove(), 500);
      }, 3000);
    }

    // فتح مودال الدعم مع إخفاء الزر الأصلي
    function openSupportModal() {
      document.getElementById("supportModal").classList.remove("hidden");
      document.getElementById("supportButton").classList.add("hidden");
      
      // إنشاء زر العودة إذا لم يكن موجوداً
      let backBtn = document.getElementById("backToMainBtn");
      if (backBtn) {
        backBtn.classList.remove("hidden");
        backBtn.style.position = "fixed";
        backBtn.style.top = "20px";
        backBtn.style.left = "20px";
        backBtn.style.zIndex = "1000";
      }
    }
    
    // إغلاق مودال الدعم وإظهار الزر الأصلي
    function closeSupportModalAndShowButton() {
      document.getElementById("supportModal").classList.add("hidden");
      document.getElementById("supportButton").classList.remove("hidden");
      document.getElementById("backToMainBtn").classList.add("hidden");
    }
    
    // البحث عن السيارة عبر جميع الورش
    async function searchCar() {
      const carNumber = document.getElementById("searchCarNumber").value.trim();
      const carPassword = document.getElementById("searchCarPassword").value.trim();
      
      if (!carNumber) {
        showAlert('الرجاء إدخال رقم السيارة', 'error');
        return;
      }
      
      if (!carPassword) {
        showAlert('الرجاء إدخال كلمة السر', 'error');
        return;
      }
      
      // إظهار مؤشر تحميل
      const searchBtn = document.querySelector('#searchView button');
      const originalText = searchBtn.innerHTML;
      searchBtn.innerHTML = '<i class="ph ph-spinner ph-spin text-xl"></i> جاري البحث...';
      searchBtn.disabled = true;
      
      try {
        // جلب جميع الورش
        const workshopsSnap = await db.ref("التصنيفات").once("value");
        const workshops = workshopsSnap.val() || {};
        
        let foundWorkshopId = null;
        let foundCarKey = null;
        let foundCar = null;
        
        // البحث في كل ورشة عن السيارة المطابقة للرقم وكلمة السر
        for (const workshopId in workshops) {
          const cars = workshops[workshopId].cars || {};
          for (const carKey in cars) {
            const car = cars[carKey];
            if (car.number === carNumber && car.passwordCar === carPassword) {
              foundWorkshopId = workshopId;
              foundCarKey = carKey;
              foundCar = car;
              break;
            }
          }
          if (foundWorkshopId) break;
        }
        
        if (foundWorkshopId && foundCar) {
          currentWorkshopId = foundWorkshopId;
          currentCarKey = foundCarKey;
          currentCarData = foundCar;
          
          // عرض تفاصيل السيارة
          displayCarDetails(foundCar);
          
          // تحديث حالة القراءة للإدارة
          await db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat`).update({
            userRead: true
          });
          
          showAlert('تم العثور على سيارتك بنجاح', 'success');
        } else {
          showAlert('لم يتم العثور على سيارة بهذه البيانات. تأكد من رقم السيارة وكلمة السر', 'error');
        }
      } catch (error) {
        console.error("Search error:", error);
        showAlert('حدث خطأ في البحث، حاول مرة أخرى', 'error');
      } finally {
        searchBtn.innerHTML = originalText;
        searchBtn.disabled = false;
      }
    }
    
    function displayCarDetails(car) {
      document.getElementById("searchView").classList.add("hidden");
      document.getElementById("carDetailsView").classList.remove("hidden");
      
      document.getElementById("detailsCarNumber").innerText = car.number || 'غير محدد';
      document.getElementById("detailsModel").innerText = car.model || 'غير محدد';
      document.getElementById("detailsDate").innerText = car.date || 'غير محدد';
      
      const statusEl = document.getElementById("detailsStatus");
      const status = car.status || 'قيد الانتظار';
      statusEl.innerText = status;
      
      // تحديد لون الحالة
      if (status === "جاهزة" || status === "جاهزة للاستلام") {
        statusEl.className = "status-badge bg-green-500 text-white";
      } else if (status === "قيد الصيانة") {
        statusEl.className = "status-badge bg-blue-500 text-white";
      } else {
        statusEl.className = "status-badge bg-yellow-500 text-white";
      }
      
      // عرض الصور
      const images = car.images || { waiting: "", maintenance: "", ready: "" };
      
      document.getElementById("waitingImageContainer").classList.add("hidden");
      document.getElementById("maintenanceImageContainer").classList.add("hidden");
      document.getElementById("readyImageContainer").classList.add("hidden");
      
      if (images.waiting) {
        document.getElementById("waitingImage").src = images.waiting;
        document.getElementById("waitingImageContainer").classList.remove("hidden");
      }
      if (images.maintenance) {
        document.getElementById("maintenanceImage").src = images.maintenance;
        document.getElementById("maintenanceImageContainer").classList.remove("hidden");
      }
      if (images.ready) {
        document.getElementById("readyImage").src = images.ready;
        document.getElementById("readyImageContainer").classList.remove("hidden");
      }
    }
    
    function backToSearch() {
      document.getElementById("carDetailsView").classList.add("hidden");
      document.getElementById("searchView").classList.remove("hidden");
      document.getElementById("searchCarNumber").value = "";
      document.getElementById("searchCarPassword").value = "";
      
      // إغلاق الدردشة إذا كانت مفتوحة
      if (chatListener) {
        if (currentWorkshopId && currentCarKey) {
          db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat`).off();
        }
        chatListener = null;
      }
      
      currentWorkshopId = null;
      currentCarKey = null;
      currentCarData = null;
    }
    
    // دوال الدردشة
    function openChat() {
      if (!currentWorkshopId || !currentCarKey) {
        showAlert('لا توجد سيارة محددة', 'error');
        return;
      }
      document.getElementById("carDetailsView").classList.add("hidden");
      document.getElementById("chatModal").classList.remove("hidden");
      loadUserChatMessages();
    }
    
    function closeChat() {
      document.getElementById("chatModal").classList.add("hidden");
      document.getElementById("carDetailsView").classList.remove("hidden");
      if (chatListener && currentWorkshopId && currentCarKey) {
        db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat`).off();
        chatListener = null;
      }
    }
    
    function loadUserChatMessages() {
      const messagesDiv = document.getElementById("chatMessages");
      
      if (chatListener) {
        if (currentWorkshopId && currentCarKey) {
          db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat`).off();
        }
      }
      
      chatListener = db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat`).on("value", snap => {
        const chat = snap.val() || {};
        messagesDiv.innerHTML = "";
        
        const messages = Object.entries(chat)
          .filter(([key, value]) => key !== 'adminRead' && key !== 'userRead' && key !== 'lastMessage' && value && value.timestamp)
          .sort((a, b) => a[1].timestamp - b[1].timestamp);
        
        for (let [msgKey, msg] of messages) {
          const div = document.createElement("div");
          div.className = `flex ${msg.from === 'user' ? 'justify-end' : 'justify-start'} mb-3`;
          
          if (msg.image) {
            div.innerHTML = `
              <div class="${msg.from === 'user' ? 'message-bubble-sent' : 'message-bubble-received'} p-2">
                <img src="${msg.image}" class="chat-image max-w-[200px] rounded-lg mb-1" onclick="openFullImage('${msg.image}')">
                ${msg.text ? `<p class="mt-1 ${msg.from === 'user' ? 'text-white' : 'text-gray-700'}">${escapeHtml(msg.text)}</p>` : ''}
                <p class="text-xs ${msg.from === 'user' ? 'text-blue-100' : 'text-gray-500'} mt-1">${new Date(msg.timestamp).toLocaleTimeString('ar-EG')}</p>
              </div>
            `;
          } else {
            div.innerHTML = `
              <div class="${msg.from === 'user' ? 'message-bubble-sent' : 'message-bubble-received'} p-3">
                <p class="${msg.from === 'user' ? 'text-white' : 'text-gray-700'}">${escapeHtml(msg.text)}</p>
                <p class="text-xs ${msg.from === 'user' ? 'text-blue-100' : 'text-gray-500'} mt-1">${new Date(msg.timestamp).toLocaleTimeString('ar-EG')}</p>
              </div>
            `;
          }
          
          messagesDiv.appendChild(div);
        }
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function sendUserMessage() {
      const text = document.getElementById("chatMessageInput").value.trim();
      if (!text || !currentCarKey) return;
      
      const messageId = Date.now().toString();
      const message = {
        text: text,
        from: 'user',
        timestamp: Date.now()
      };
      
      db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat/${messageId}`).set(message)
        .then(() => {
          db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat`).update({
            lastMessage: message,
            adminRead: false,
            userRead: true
          });
          document.getElementById("chatMessageInput").value = "";
        })
        .catch(() => showAlert("فشل في إرسال الرسالة", 'error'));
    }
    
    function uploadChatImage() {
      document.getElementById("chatImageInput").click();
    }
    
    function handleUserChatImageUpload(event) {
      const file = event.target.files[0];
      if (!file || !currentCarKey) return;
      
      if (file.size > 5 * 1024 * 1024) {
        showAlert('حجم الصورة يجب أن يكون أقل من 5 ميجابايت', 'error');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const messageId = Date.now().toString();
        const message = {
          image: e.target.result,
          from: 'user',
          timestamp: Date.now()
        };
        
        db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat/${messageId}`).set(message)
          .then(() => {
            db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/chat`).update({
              lastMessage: message,
              adminRead: false,
              userRead: true
            });
          })
          .catch(() => showAlert("فشل في إرسال الصورة", 'error'));
      };
      
      reader.readAsDataURL(file);
      event.target.value = ''; // إعادة تعيين input
    }
    
    // دوال عرض الصورة الكاملة
    function openFullImage(src) {
      document.getElementById("fullImage").src = src;
      document.getElementById("fullImageModal").classList.remove("hidden");
    }
    
    function closeFullImage() {
      document.getElementById("fullImageModal").classList.add("hidden");
    }
    
    // إرسال شكوى الدعم
    function sendUserSupportTicket() {
      const phone = document.getElementById("supportPhone").value.trim();
      const type = document.getElementById("supportType").value;
      const message = document.getElementById("supportMessage").value.trim();
      
      if (!phone || !message) {
        showAlert('يرجى إدخال رقم الهاتف والرسالة', 'error');
        return;
      }
      
      // التحقق من رقم هاتف ليبي (يبدأ بـ 09 ويتبعه 8 أرقام)
      if (!/^09\d{8}$/.test(phone)) {
        showAlert('رقم الهاتف غير صحيح (يجب أن يبدأ بـ 09 ويتبعه 8 أرقام)', 'error');
        return;
      }
      
      const ticket = {
        phone: phone,
        type: type,
        message: message,
        timestamp: Date.now(),
        workshopId: currentWorkshopId || 'unknown',
        workshopName: currentWorkshopId ? 'تم البحث عن سيارة' : 'غير محدد',
        carNumber: currentCarData?.number || 'غير محدد',
        status: 'جديد'
      };
      
      db.ref("supportTickets").push(ticket)
        .then(() => {
          showAlert('تم إرسال الشكوى إلى مركز الدعم بنجاح', 'success');
          document.getElementById("supportPhone").value = "";
          document.getElementById("supportMessage").value = "";
          closeSupportModalAndShowButton();
        })
        .catch(() => showAlert('فشل في إرسال الشكوى', 'error'));
    }
    
    // تفعيل البحث عند الضغط على Enter
    document.addEventListener('DOMContentLoaded', () => {
      const carNumberInput = document.getElementById("searchCarNumber");
      const carPasswordInput = document.getElementById("searchCarPassword");
      
      const handleEnter = (e) => {
        if (e.key === 'Enter') {
          searchCar();
        }
      };
      
      carNumberInput.addEventListener('keypress', handleEnter);
      carPasswordInput.addEventListener('keypress', handleEnter);
    });
  </script>
</body>
</html>
